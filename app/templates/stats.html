{% extends "layout.html" %}
{% block page_title %}数据统计分析{% endblock %}
{% block page_content %}
<div x-data="statsApp()" x-init="loadAll()" class="space-y-6">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <div class="flex flex-wrap items-center gap-4">
            <div class="flex items-center space-x-2">
                <label class="text-sm text-gray-600">统计周期：</label>
                <select x-model="days" @change="loadAll()"
                    class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option :value="1" x-text="'近1天'"></option>
                    <option :value="7" x-text="'近7天'"></option>
                    <option :value="30" x-text="'近30天'"></option>
                    <option :value="90" x-text="'近90天'"></option>
                </select>
            </div>
            <div class="flex items-center space-x-2">
                <label class="text-sm text-gray-600">门店：</label>
                <select x-model="store_id" @change="loadHourly()"
                    class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <option value="">全部</option>
                    <template x-for="s in stores" :key="s.id">
                        <option :value="s.id" x-text="s.floor + 'F - ' + s.name"></option>
                    </template>
                </select>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <p class="text-sm text-gray-500">取号总数</p>
            <p class="text-3xl font-bold text-gray-800 mt-2" x-text="overview.total_records || 0"></p>
            <p class="text-xs text-gray-400 mt-2" x-text="'周期：近' + days + '天'"></p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6">
            <p class="text-sm text-gray-500">入场人次</p>
            <p class="text-3xl font-bold text-blue-600 mt-2" x-text="overview.entered_records || 0"></p>
            <p class="text-xs text-gray-400 mt-2">
                转化率：<span class="text-blue-600 font-medium" x-text="overview.total_records ? Math.round(overview.entered_records / overview.total_records * 100) + '%' : '0%'"></span>
            </p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6">
            <p class="text-sm text-gray-500">平均等候时长</p>
            <p class="text-3xl font-bold text-green-600 mt-2" x-text="(overview.avg_wait_minutes || 0) + ' 分钟'"></p>
            <p class="text-xs text-gray-400 mt-2">从取号到叫号的平均时间</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6">
            <p class="text-sm text-gray-500">过号率</p>
            <p class="text-3xl font-bold" :class="(overview.overtime_rate || 0) > 20 ? 'text-red-600' : 'text-orange-600'"
               x-text="(overview.overtime_rate || 0) + '%'"></p>
            <p class="text-xs text-gray-400 mt-2" x-text="'过号 ' + (overview.overtime_records || 0) + ' 人次'"></p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">时段热度分析</h3>
            <div class="mb-2 text-sm text-gray-500" x-show="hourly.peak_hour">
                高峰时段：<span class="font-medium text-red-600" x-text="hourly.peak_hour?.hour + '，取号 ' + hourly.peak_hour?.count + ' 次'"></span>
            </div>
            <div class="space-y-2">
                <template x-for="h in hourly.hourly_stats || []" :key="h.hour">
                    <div class="flex items-center">
                        <span class="w-16 text-sm text-gray-600" x-text="h.hour"></span>
                        <div class="flex-1 h-8 mx-3 rounded relative overflow-hidden bg-gray-100">
                            <div class="absolute left-0 top-0 bottom-0 rounded transition-all duration-500"
                                 :class="heatLevelClass(h.heat_level)"
                                 :style="{ width: (h.count / maxHourlyCount * 100) + '%' }"></div>
                            <span class="absolute inset-0 flex items-center px-3 text-sm font-medium"
                                  :class="h.heat_level >= 3 ? 'text-white' : 'text-gray-700'"
                                  x-text="h.count"></span>
                        </div>
                        <span class="w-20 text-right text-xs"
                              :class="h.overtime_rate > 20 ? 'text-red-600 font-medium' : 'text-gray-500'"
                              x-text="'过号' + h.overtime_rate + '%'"></span>
                    </div>
                </template>
            </div>
            <div class="mt-4 pt-4 border-t grid grid-cols-5 gap-2 text-center text-xs">
                <div><span class="inline-block w-4 h-4 rounded heat-level-0 align-middle mr-1"></span>空闲</div>
                <div><span class="inline-block w-4 h-4 rounded heat-level-1 align-middle mr-1"></span>较低</div>
                <div><span class="inline-block w-4 h-4 rounded heat-level-2 align-middle mr-1"></span>适中</div>
                <div><span class="inline-block w-4 h-4 rounded heat-level-3 align-middle mr-1"></span>繁忙</div>
                <div><span class="inline-block w-4 h-4 rounded heat-level-4 align-middle mr-1"></span>爆满</div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">门店热度排行</h3>
            <div class="space-y-3">
                <template x-for="(s, idx) in storeStats" :key="s.store_id">
                    <div class="p-3 rounded-lg border"
                         :class="heatBorderClass(s.heat_level)">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center">
                                <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold mr-3"
                                      :class="idx < 3 ? 'bg-yellow-400 text-yellow-900' : 'bg-gray-200 text-gray-600'"
                                      x-text="idx + 1"></span>
                                <div>
                                    <p class="font-medium text-gray-800" x-text="s.store_name"></p>
                                    <p class="text-xs text-gray-500" x-text="s.floor + 'F · 试衣间' + s.rooms_count + '间'"></p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold text-gray-800" x-text="s.total"></p>
                                <p class="text-xs text-gray-500">取号</p>
                            </div>
                        </div>
                        <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full rounded-full"
                                 :class="heatLevelBgClass(s.heat_level)"
                                 :style="{ width: (s.total / maxStoreCount * 100) + '%' }"></div>
                        </div>
                        <div class="flex justify-between mt-2 text-xs text-gray-500">
                            <span>平均等候 <span class="font-medium text-blue-600" x-text="s.avg_wait_minutes + '分'"></span></span>
                            <span>过号率 <span class="font-medium"
                                  :class="s.overtime_rate > 20 ? 'text-red-600' : 'text-orange-600'"
                                  x-text="s.overtime_rate + '%'"></span></span>
                        </div>
                    </div>
                </template>
                <template x-if="storeStats.length === 0">
                    <div class="text-center py-8 text-gray-400">暂无数据</div>
                </template>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm p-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">每日趋势（近30天）</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">日期</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">取号数</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">入场数</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">过号数</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">平均等候</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">过号率</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="d in dailyStats.slice().reverse()" :key="d.date">
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-3 text-gray-800 font-medium" x-text="d.date"></td>
                            <td class="px-4 py-3 text-gray-600" x-text="d.total"></td>
                            <td class="px-4 py-3 text-blue-600 font-medium" x-text="d.entered"></td>
                            <td class="px-4 py-3" x-text="d.overtime">
                                <span :class="d.overtime > 0 ? 'text-orange-600' : 'text-gray-400'" x-text="d.overtime"></span>
                            </td>
                            <td class="px-4 py-3 text-green-600" x-text="d.avg_wait_minutes + '分'"></td>
                            <td class="px-4 py-3">
                                <span class="px-2 py-0.5 rounded text-xs"
                                      :class="d.overtime_rate > 20 ? 'bg-red-100 text-red-700' : 'bg-gray-100 text-gray-600'"
                                      x-text="d.overtime_rate + '%'"></span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block page_scripts %}
<script>
function statsApp() {
    return {
        days: 7,
        store_id: '',
        stores: [],
        overview: {},
        hourly: {},
        storeStats: [],
        dailyStats: [],

        get maxHourlyCount() {
            return Math.max(...(this.hourly.hourly_stats || []).map(h => h.count), 1);
        },

        get maxStoreCount() {
            return Math.max(...(this.storeStats || []).map(s => s.total), 1);
        },

        heatLevelClass(level) {
            return {
                0: 'bg-gray-200',
                1: 'bg-yellow-200',
                2: 'bg-yellow-400',
                3: 'bg-red-300',
                4: 'bg-red-500'
            }[level] || 'bg-gray-200';
        },

        heatLevelBgClass(level) {
            return {
                0: 'bg-gray-400',
                1: 'bg-yellow-400',
                2: 'bg-orange-400',
                3: 'bg-red-400',
                4: 'bg-red-600'
            }[level] || 'bg-gray-400';
        },

        heatBorderClass(level) {
            return {
                0: 'border-gray-200 bg-gray-50',
                1: 'border-yellow-200 bg-yellow-50',
                2: 'border-yellow-300 bg-yellow-50',
                3: 'border-red-200 bg-red-50',
                4: 'border-red-300 bg-red-50'
            }[level] || 'border-gray-200';
        },

        async loadAll() {
            const storesRes = await API.get('/api/stores?status=true');
            if (storesRes?.code === 0) this.stores = storesRes.data;
            await Promise.all([this.loadOverview(), this.loadHourly(), this.loadStoreStats(), this.loadDaily()]);
        },

        async loadOverview() {
            const res = await API.get('/api/stats/overview?days=' + this.days);
            if (res?.code === 0) this.overview = res.data;
        },

        async loadHourly() {
            let url = '/api/stats/hourly?days=' + this.days;
            if (this.store_id) url += '&store_id=' + this.store_id;
            const res = await API.get(url);
            if (res?.code === 0) this.hourly = res.data;
        },

        async loadStoreStats() {
            const res = await API.get('/api/stats/stores?days=' + this.days);
            if (res?.code === 0) this.storeStats = res.data;
        },

        async loadDaily() {
            const res = await API.get('/api/stats/daily?days=30');
            if (res?.code === 0) this.dailyStats = res.data;
        }
    }
}
</script>
{% endblock %}
