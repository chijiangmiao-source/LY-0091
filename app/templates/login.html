{% extends "base.html" %}
{% block title %}登录 - 试衣间排队叫号系统{% endblock %}
{% block content %}
<div x-data="loginApp()" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">试衣间排队叫号系统</h1>
            <p class="text-gray-500 mt-2">商场试衣间智能管理平台</p>
        </div>

        <form @submit.prevent="handleLogin" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                <input type="text" x-model="username" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="请输入用户名">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <input type="password" x-model="password" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    placeholder="请输入密码">
            </div>

            <button type="submit" :disabled="loading"
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed transition flex items-center justify-center">
                <svg x-show="loading" class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span x-text="loading ? '登录中...' : '登 录'"></span>
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            <p>默认账号: admin / admin123</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loginApp() {
    return {
        username: '',
        password: '',
        loading: false,
        async handleLogin() {
            this.loading = true;
            try {
                const res = await API.post('/api/login', {
                    username: this.username,
                    password: this.password
                });
                if (res.code === 0) {
                    localStorage.setItem('token', res.data.token);
                    localStorage.setItem('user', JSON.stringify(res.data.user));
                    toast('登录成功');
                    setTimeout(() => window.location.href = '/', 500);
                } else {
                    toast(res.message || '登录失败', 'error');
                }
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
