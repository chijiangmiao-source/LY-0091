<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}试衣间排队叫号系统{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .heat-level-0 { background-color: #f3f4f6; }
        .heat-level-1 { background-color: #fef3c7; }
        .heat-level-2 { background-color: #fde68a; }
        .heat-level-3 { background-color: #fca5a5; }
        .heat-level-4 { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="bg-gray-50">
{% block content %}{% endblock %}
<script>
const API = {
    async request(url, options = {}) {
        const token = localStorage.getItem('token');
        const headers = {
            'Content-Type': 'application/json',
            ...(options.headers || {})
        };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        try {
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
                return;
            }
            const data = await res.json();
            return data;
        } catch (e) {
            console.error(e);
            return { code: -1, message: '网络错误' };
        }
    },
    get(url) { return this.request(url); },
    post(url, body) { return this.request(url, { method: 'POST', body: JSON.stringify(body) }); },
    put(url, body) { return this.request(url, { method: 'PUT', body: JSON.stringify(body) }); },
    del(url) { return this.request(url, { method: 'DELETE' }); }
};

function toast(message, type = 'success') {
    const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
    };
    const el = document.createElement('div');
    el.className = `fixed top-4 right-4 z-50 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg animate-bounce`;
    el.textContent = message;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function formatDate(d) {
    if (!d) return '-';
    const dt = new Date(d);
    return dt.toLocaleString('zh-CN', { hour12: false });
}

function formatTime(d) {
    if (!d) return '-';
    const dt = new Date(d);
    return dt.toLocaleTimeString('zh-CN', { hour12: false });
}

function checkAuth() {
    const token = localStorage.getItem('token');
    if (!token && !window.location.pathname.startsWith('/login')) {
        window.location.href = '/login';
    }
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
